<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客阅读</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <!-- 引入 marked.js 解析器 -->
    <script src="./assets/js/marked.min.js"></script>
</head>
<body>
    <!-- 动态背景层 (图片地址由 JS 随机注入) -->
    <div class="background-layer"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <section class="article-hero" id="top">
        <div style="position: absolute; top: 40px; left: 40px;">
            <a href="./index.html" class="nav-btn">← 返回文章列表</a>
        </div>
        
        <div class="article-header" style="max-width: 800px; padding: 0 20px;">
            <h1 id="article-title">正在加载...</h1>
            <div style="color: var(--text-main); font-weight: 600; margin-top: 15px; font-size: 1.1rem;">
                发布于 <span id="article-date" style="color: var(--accent-4); font-weight: bold;">...</span>
            </div>
        </div>
    </section>

    <section id="article-body">
        <div class="container">
            <article class="glass-panel article-content" id="markdown-content">
                <div style="text-align: center; color: #999;">
                    正在翻阅日记本...
                </div>
            </article>
        </div>
    </section>

    <script src="./assets/js/main.js"></script>
</body>
</html>
