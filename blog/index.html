<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <!-- 动态背景层 (图片地址由 JS 随机注入) -->
    <div class="background-layer"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <section class="hero" id="home">
        <div style="position: absolute; top: 40px; width: 100%; text-align: center;">
            <a href="/" class="nav-btn">⌂ 网站首页</a>
        </div>
        <h1>时雨初风的博客</h1>
        
        <!-- 🌟 新的打字机结构 -->
        <div class="typewriter-container">
            <span id="typewriter-text"></span>
            <span class="typewriter-cursor"></span>
        </div>
        
        <a href="#content" class="scroll-indicator">
            <div class="mouse"></div>
            <span>向下滑动探索</span>
        </a>
    </section>

    <section class="content-wrapper" id="content">
        <div class="container">
            <div id="post-container" class="post-list">
                <div class="glass-panel" style="text-align:center;">正在加载文章档案...</div>
            </div>
        </div>
    </section>

    <script src="./assets/js/main.js"></script>
</body>
</html>
